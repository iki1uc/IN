<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IN · Mini-Portal</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#portal {
    width: 260px;
    height: 260px;
    margin: auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 8s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #6cf;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
</style>

<script src="IN.core.js"></script>
<script src="IN.scan.js"></script>
<script src="IN.pipe.js"></script>

</head>

<body>

<h1>IN · Mini-Portal</h1>

<div id="portal"></div>
<pre id="status">Lade IN…</pre>

<script>
const portal = document.getElementById("portal");
const count = 24;
const radius = 120;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 130 - 5;
    const y = Math.sin(angle) * radius + 130 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    portal.appendChild(dot);
}

IN.enter(42);
const scan = IN_SCAN.detect(IN.input);
const forward = IN_PIPE.forward(scan);

document.getElementById("status").innerText =
    JSON.stringify({ IN: IN.status(), scan, forward }, null, 2);
</script>

</body>
</html>
